<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Nexus Study Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        /* Prevent pull-to-refresh and elastic scrolling on mobile */
        overscroll-behavior-y: none;
        
        /* Handle safe areas for phones with notches */
        /* NOTE: Top padding moved to App.tsx Header for better styling */
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        
        /* Remove the blue flash when tapping on mobile */
        -webkit-tap-highlight-color: transparent;

        /* Default: Allow text selection (Crucial for Study Apps) */
        -webkit-user-select: text;
        user-select: text;
      }

      /* OPTIONAL: Make UI elements (Header, Nav, Buttons) feel like a native app by disabling selection */
      header, nav, button, input[type="range"], select {
        -webkit-user-select: none;
        user-select: none;
      }
      
      /* Ensure inputs are easy to click */
      input, textarea, select, button {
        outline: none;
      }
    </style>
</head>
  <body class="bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
